<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Habit</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="notification-container" id="notificationContainer"></div>

    <div class="container-fluid min-vh-100">
        <div class="row min-vh-100">
            <!-- Левая колонка с преимуществами -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center hero-section">
                <div class="text-white text-center px-5">
                    <i class="bi bi-rocket-takeoff display-1 mb-4"></i>
                    <h2 class="display-4 fw-bold mb-4">Начни свой путь!</h2>
                    <p class="fs-5 mb-4">Присоединяйся к сообществу людей, меняющих свою жизнь к лучшему</p>
                    
                    <div class="row g-4 mt-5">
                        <div class="col-4"><div class="h3 fw-bold">15k+</div><div>Пользователей</div></div>
                        <div class="col-4"><div class="h3 fw-bold">150k+</div><div>Привычек</div></div>
                        <div class="col-4"><div class="h3 fw-bold">4.8</div><div>Рейтинг</div></div>
                    </div>

                    <div class="features-list text-start mt-5">
                        <div class="d-flex align-items-center mb-3"><i class="bi bi-check-circle-fill text-success me-3 fs-4"></i><span class="fs-5">Отслеживай прогресс</span></div>
                        <div class="d-flex align-items-center mb-3"><i class="bi bi-trophy-fill text-warning me-3 fs-4"></i><span class="fs-5">Получай достижения</span></div>
                        <div class="d-flex align-items-center mb-3"><i class="bi bi-people-fill text-info me-3 fs-4"></i><span class="fs-5">Делись опытом с другими</span></div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка с формой регистрации -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-light">
                <div class="w-100 px-4 px-lg-5" style="max-width: 500px;">
                    <div class="text-center mb-4">
                        <a href="index.html" class="text-decoration-none"><h1 class="display-5 fw-bold" style="color: var(--primary);"><i class="bi bi-check-circle-fill" style="color: var(--accent);"></i> Habit</h1></a>
                        <p class="text-muted">Создайте аккаунт и начните меняться</p>
                    </div>

                    <form id="registerForm">
                        <div class="mb-3"><label class="form-label fw-medium">Ваше имя</label><div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span><input type="text" class="form-control border-start-0 ps-0" id="regName" placeholder="Введите ваше имя" required></div></div>
                        <div class="mb-3"><label class="form-label fw-medium">Email</label><div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span><input type="email" class="form-control border-start-0 ps-0" id="regEmail" placeholder="example@mail.com" required></div></div>
                        <div class="mb-3"><label class="form-label fw-medium">Логин</label><div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-person-badge text-muted"></i></span><input type="text" class="form-control border-start-0 ps-0" id="regUsername" placeholder="Придумайте логин" required></div></div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-medium">Пароль</label>
                            <div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span><input type="password" class="form-control border-start-0 ps-0" id="regPassword" placeholder="Минимум 6 символов" required onkeyup="checkPasswordStrength()"></div>
                            <div class="mt-2"><div class="d-flex justify-content-between align-items-center mb-1"><small class="text-muted">Надежность пароля:</small><small class="text-muted" id="passwordStrengthText">Слабый</small></div><div class="progress" style="height: 4px;"><div class="progress-bar" id="passwordStrengthBar" style="width: 0%; background: #c97c5d;"></div></div></div>
                        </div>
                        
                        <div class="mb-3"><label class="form-label fw-medium">Подтвердите пароль</label><div class="input-group"><span class="input-group-text bg-white border-end-0"><i class="bi bi-lock-fill text-muted"></i></span><input type="password" class="form-control border-start-0 ps-0" id="regPasswordConfirm" placeholder="Повторите пароль" required></div></div>
                        
                        <div class="mb-4 form-check"><input type="checkbox" class="form-check-input" id="agreeTerms" required><label class="form-check-label text-muted" for="agreeTerms">Я согласен с <a href="#" class="text-primary">условиями использования</a> и <a href="#" class="text-primary">политикой конфиденциальности</a></label></div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3"><i class="bi bi-person-plus me-2"></i>Зарегистрироваться</button>
                        
                        <div class="text-center"><p class="text-muted mb-0">Уже есть аккаунт? <a href="login.html" class="text-primary fw-medium">Войти</a></p></div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/users.js"></script>
    
    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const bar = document.getElementById('passwordStrengthBar');
            const text = document.getElementById('passwordStrengthText');
            let strength = 0; let color = '#c97c5d'; let strengthText = 'Слабый';
            if (password.length >= 6) strength += 1;
            if (password.length >= 8) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^A-Za-z0-9]/.test(password)) strength += 1;
            if (strength <= 2) { color = '#c97c5d'; strengthText = 'Слабый'; }
            else if (strength <= 4) { color = '#d9b382'; strengthText = 'Средний'; }
            else { color = '#b5c9a0'; strengthText = 'Надежный'; }
            const width = (strength / 5) * 100;
            bar.style.width = width + '%'; bar.style.background = color;
            text.textContent = strengthText; text.style.color = color;
        }

        function fillDemoData() {
            document.getElementById('regName').value = 'Новый пользователь';
            document.getElementById('regEmail').value = 'newuser@example.com';
            document.getElementById('regUsername').value = 'newuser';
            document.getElementById('regPassword').value = 'password123';
            document.getElementById('regPasswordConfirm').value = 'password123';
            document.getElementById('agreeTerms').checked = true;
            checkPasswordStrength();
        }

        function clearForm() {
            document.getElementById('registerForm').reset();
            document.getElementById('passwordStrengthBar').style.width = '0%';
            document.getElementById('passwordStrengthText').textContent = 'Слабый';
            document.getElementById('passwordStrengthBar').style.background = '#c97c5d';
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            const agree = document.getElementById('agreeTerms').checked;
            if (!name || !email || !username || !password || !confirm) { showNotification('❌ Заполните все поля', 'danger'); return; }
            if (!agree) { showNotification('❌ Примите условия использования', 'danger'); return; }
            if (password !== confirm) { showNotification('❌ Пароли не совпадают', 'danger'); return; }
            if (password.length < 6) { showNotification('❌ Пароль должен содержать минимум 6 символов', 'danger'); return; }
            if (!email.includes('@') || !email.includes('.')) { showNotification('❌ Введите корректный email', 'danger'); return; }
            const userData = { name: name, email: email, username: username, password: password };
            if (typeof window.register === 'function') { window.register(userData); }
            else if (typeof window.registerUser === 'function') { window.registerUser(userData); }
            else { showNotification('❌ Ошибка регистрации', 'danger'); }
        });

        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', function() { this.closest('.input-group').querySelector('.input-group-text').classList.add('border-primary'); });
            input.addEventListener('blur', function() { this.closest('.input-group').querySelector('.input-group-text').classList.remove('border-primary'); });
        });
    </script>

    <style>
        .input-group-text { background: white; border-right: none; transition: all 0.3s; }
        .form-control:focus { box-shadow: none; border-color: #d9b382; }
        .form-control:focus + .input-group-text { border-color: #d9b382; }
        .input-group:focus-within .input-group-text { border-color: #d9b382; color: #d9b382; }
        .input-group:focus-within .input-group-text i { color: #d9b382 !important; }
        .btn-primary { background: linear-gradient(135deg, #3a2c29 0%, #5a4a47 100%); border: none; padding: 12px; font-weight: 600; transition: all 0.3s; }
        .btn-primary:hover { background: linear-gradient(135deg, #5a4a47 0%, #3a2c29 100%); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(58, 44, 41, 0.2); }
        .btn-outline-secondary { border: 1px solid rgba(58, 44, 41, 0.1); color: #3a2c29; font-size: 0.9rem; }
        .btn-outline-secondary:hover { background: #faf5ec; border-color: #d9b382; color: #3a2c29; }
        .hero-section { background: linear-gradient(135deg, #3a2c29 0%, #5a4a47 100%); min-height: 100vh; }
        .features-list .d-flex { background: rgba(255, 255, 255, 0.1); padding: 10px 15px; border-radius: 12px; backdrop-filter: blur(5px); }
        .features-list .d-flex i { font-size: 1.5rem; }
        .form-check-input:checked { background-color: #d9b382; border-color: #d9b382; }
        a.text-primary { color: #3a2c29 !important; text-decoration: none; font-weight: 500; }
        a.text-primary:hover { color: #d9b382 !important; }
        .bg-light { background: linear-gradient(135deg, #ffffff 0%, #faf5ec 100%) !important; }
    </style>
</body>
</html>
