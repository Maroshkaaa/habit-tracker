<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Habit</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="notification-container" id="notificationContainer"></div>

    <div class="container-fluid min-vh-100">
        <div class="row min-vh-100">
            <!-- Левая колонка с приветствием -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center hero-section">
                <div class="text-white text-center px-5">
                    <i class="bi bi-check-circle-fill display-1 mb-4"></i>
                    <h2 class="display-4 fw-bold mb-4">Добро пожаловать!</h2>
                    <p class="fs-5 mb-4">Присоединяйся к сообществу людей, меняющих свою жизнь к лучшему</p>
                    
                    <div class="row g-4 mt-5">
                        <div class="col-4">
                            <div class="h3 fw-bold">15k+</div>
                            <div>Пользователей</div>
                        </div>
                        <div class="col-4">
                            <div class="h3 fw-bold">150k+</div>
                            <div>Привычек</div>
                        </div>
                        <div class="col-4">
                            <div class="h3 fw-bold">4.8</div>
                            <div>Рейтинг</div>
                        </div>
                    </div>

                    <!-- Список преимуществ -->
                    <div class="features-list text-start mt-5">
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-check-circle-fill text-success me-3 fs-4"></i>
                            <span class="fs-5">Отслеживай прогресс</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-trophy-fill text-warning me-3 fs-4"></i>
                            <span class="fs-5">Получай достижения</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-people-fill text-info me-3 fs-4"></i>
                            <span class="fs-5">Делись опытом с другими</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка с формой входа -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-light">
                <div class="w-100 px-4 px-lg-5" style="max-width: 450px;">
                    <div class="text-center mb-5">
                        <a href="index.html" class="text-decoration-none">
                            <h1 class="display-5 fw-bold" style="color: var(--primary);">
                                <i class="bi bi-check-circle-fill" style="color: var(--accent);"></i> Habit
                            </h1>
                        </a>
                        <p class="text-muted">Войди в свой аккаунт</p>
                    </div>

                    <form id="loginForm">
                        <!-- Логин -->
                        <div class="mb-4">
                            <label class="form-label fw-medium">Логин</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text" class="form-control border-start-0 ps-0" 
                                       id="username" placeholder="Введите логин" required>
                            </div>
                        </div>
                        
                        <!-- Пароль -->
                        <div class="mb-4">
                            <label class="form-label fw-medium">Пароль</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password" class="form-control border-start-0 ps-0" 
                                       id="password" placeholder="Введите пароль" required>
                            </div>
                        </div>
                        
                        <!-- Запомнить меня и забыли пароль -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label text-muted" for="rememberMe">Запомнить меня</label>
                            </div>
                            <a href="#" class="text-primary small">Забыли пароль?</a>
                        </div>
                        
                        <!-- Кнопка входа -->
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                        </button>
                        
                        <!-- Ссылка на регистрацию -->
                        <div class="text-center">
                            <p class="text-muted mb-0">
                                Нет аккаунта? <a href="register.html" class="text-primary fw-medium">Зарегистрироваться</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Инициализация страницы входа
        document.addEventListener('DOMContentLoaded', function() {
            // Добавляем эффект фокуса на поля
            document.querySelectorAll('.input-group input').forEach(input => {
                input.addEventListener('focus', function() {
                    this.closest('.input-group').querySelector('.input-group-text').classList.add('border-primary');
                });
                input.addEventListener('blur', function() {
                    this.closest('.input-group').querySelector('.input-group-text').classList.remove('border-primary');
                });
            });
            
            if (typeof initLoginPage === 'function') {
                initLoginPage();
            }
        });
    </script>

    <style>
        /* Дополнительные стили */
        .input-group-text {
            background: white;
            border-right: none;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            box-shadow: none;
            border-color: #d9b382;
        }
        
        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: #d9b382;
        }
        
        .input-group:focus-within .input-group-text i {
            color: #d9b382 !important;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3a2c29 0%, #5a4a47 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a4a47 0%, #3a2c29 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(58, 44, 41, 0.2);
        }
        
        .hero-section {
            background: linear-gradient(135deg, #3a2c29 0%, #5a4a47 100%);
            min-height: 100vh;
        }
        
        .features-list .d-flex {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        
        .form-check-input:checked {
            background-color: #d9b382;
            border-color: #d9b382;
        }
        
        a.text-primary {
            color: #3a2c29 !important;
            text-decoration: none;
            font-weight: 500;
        }
        
        a.text-primary:hover {
            color: #d9b382 !important;
        }
        
        .bg-light {
            background: linear-gradient(135deg, #ffffff 0%, #faf5ec 100%) !important;
        }
    </style>
</body>
</html>
